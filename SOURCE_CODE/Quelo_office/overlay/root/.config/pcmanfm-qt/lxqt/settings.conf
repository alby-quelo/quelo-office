# Icona "Home" nativa di pcmanfm-qt (DesktopShortcuts=Home): e' quella
# che funziona per il doppio click (apre la cartella corretta, e' gia'
# "trusted" da sola, nessun problema di MIME/LibreOffice). L'UNICO difetto
# e' che pcmanfm-qt scrive sempre Name=g_get_user_name() ("root") - vedi
# quelo-home-label-fix.sh richiamato da root/.config/openbox/autostart,
# che corregge SOLO l'etichetta (Name=) del file gia' creato da
# pcmanfm-qt, dopo che l'ha creato, esattamente come farebbe un utente a
# mano col tasto destro "Rinomina" - senza toccare URL (che e' il campo
# che pcmanfm-qt controlla per decidere se il file resta "trusted").
[Desktop]
DesktopShortcuts=Home
Wallpaper=/usr/share/quelo-office/quelo-sfondo.png
WallpaperMode=stretch

# Dischi/partizioni (es. NVMe interno) devono essere VISIBILI in "Gestione
# file" > Dispositivi (richiede udisks2, vedi hooks/0160-quelo-trim.chroot),
# ma senza alcun automount: l'utente vuole montarli lui a mano cliccandoci
# sopra quando serve, non che compaiano/si montino da soli.
[Volume]
MountOnStartup=false
MountRemovable=false
AutoRun=false
