panels=panel_top,panel_bottom

[panel_top]
position=Top
desktop=0
width=100
width-percent=true
panelSize=28
# Lo spazio dei pannelli e' riservato staticamente via <margins> in
# rc.xml (hooks/0400-quelo-desktop.chroot): reserve-space va lasciato
# false, altrimenti la riserva EWMH duplica il margine e sposta il
# pannello stesso (vedi commento nel hook).
reserve-space=false
hide-on-overlap=false
animation-duration=0
# opacity=100 esplicito (valore intero semplice, non un QVariant binario
# come background-color/font-color): garantisce che il pannello sia
# sempre completamente opaco, cosi' lo sfondo scuro del desktop non
# "trapassa" mai visivamente il pannello (sospetto concreto quando e'
# comparso lo sfondo scuro: entrambi i pannelli sono sembrati piu' scuri
# proprio nello stesso momento in cui e' stato introdotto lo sfondo).
opacity=100
plugins=version,spacer1,ram,spacer2,homedisk,spacer3,clock

# Layout sinistra/centro/destra: lxqt-panel non ha un vero meccanismo di
# centraggio a 3 zone dentro un solo pannello (limite noto del progetto).
# spacer1 e spacer3 sono "elastici" (expandable=true): assorbono tutto lo
# spazio libero, spingendo "version" a sinistra e "clock" a destra, con
# ram+homedisk che restano nel mezzo (non perfettamente centrati al pixel
# se i testi esterni hanno lunghezze diverse, ma corretto visivamente).
# spacer2 (fra ram e homedisk) resta NON elastico: e' solo un piccolo
# distanziatore fisso fra i due, non deve allontanarli fra loro.

[panel_bottom]
position=Bottom
desktop=0
width=100
width-percent=true
panelSize=32
reserve-space=false
hide-on-overlap=false
animation-duration=0
opacity=100
plugins=menu,spacer4,taskbar,spacer5,statusnotifier,tray,volume,trash,power

[menu]
type=customcommand
command=true
repeat=false
text=Menu
icon=/usr/share/quelo-office/logo.png
click=quelo-menu
font="sans serif,13,-1,5,50,0,0,0,0,0"

# Pulsante spegnimento/riavvio: prima era integrato di default nel footer
# del plugin "mainmenu" di LXQt, rimosso insieme al menu standard (vedi
# [menu] sopra). Va quindi reintrodotto qui esplicitamente.
[power]
type=customcommand
command=true
repeat=false
text=Spegni
click=quelo-power
font="sans serif,13,-1,5,50,0,0,0,0,0"

# Controllo volume nativo (slider al click, scroll per cambiare volume
# senza aprire nulla): plugin di lxqt-panel stesso, si appoggia a
# PulseAudio (pacchetto pulseaudio, gia' installato). Il tasto destro
# permette di lanciare pavucontrol per i controlli avanzati.
[volume]
type=volume

# Bluetooth: niente pulsante customcommand dedicato (era solo testo,
# senza icona vera). Usiamo l'applet nativo (blueman-applet, gia' avviato
# in autostart, vedi root/.config/openbox/autostart): mostra la sua
# icona direttamente nello [statusnotifier] qui sotto, con lo stesso
# menu di blueman-manager al click, cioe' il vero "apposito applet"
# invece di un'imitazione con customcommand.
[trash]
type=customcommand
command=true
repeat=false
icon=user-trash
click=pcmanfm-qt trash:///

[taskbar]
type=taskbar
closeOnMiddleClick=true

[version]
type=customcommand
command=/usr/local/bin/quelo-status-version
repeat=false
text=%1
maxWidth=320

# command= punta a script dedicati (usr/local/bin/quelo-status-*) invece
# di comandi awk/pipe inline: eliminiamo cosi' qualunque rischio di
# escaping/parsing imprevisto nel formato ini letto da QSettings.
# maxWidth: default lxqt-panel e' 200 px e tronca il testo con "...".
[ram]
type=customcommand
command=/usr/local/bin/quelo-status-ram
repeatTimer=5
text=%1
maxWidth=520

[homedisk]
type=customcommand
command=/usr/local/bin/quelo-status-home
repeatTimer=10
text=%1
maxWidth=520

[clock]
type=customcommand
command=date '+%d %B %Y  %H:%M'
repeatTimer=20
text=%1

[statusnotifier]
type=statusnotifier
alignment=Right

[tray]
type=tray
alignment=Right

[spacer1]
type=spacer
expandable=true

[spacer2]
type=spacer

[spacer3]
type=spacer
expandable=true

[spacer4]
type=spacer

[spacer5]
type=spacer
