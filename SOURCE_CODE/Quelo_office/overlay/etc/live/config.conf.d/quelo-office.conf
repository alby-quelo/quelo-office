LIVE_HOSTNAME="quelo-office"
LIVE_USERNAME="root"
# Autologin testuale nativo di live-config su tty1 (root, via agetty -a):
# niente piu' SDDM/display manager. root/.bash_profile lancia poi "startx"
# in automatico, che a sua volta lancia root/.xinitrc (LXQt+Openbox).
LIVE_AUTOLOGIN="true"
LIVE_USER_DEFAULT_GROUPS=""
LIVE_LOCALES="it_IT.UTF-8"
# CRITICO: senza questa, il componente "tzdata" di live-config (che scrive
# /etc/timezone/localtime ad OGNI boot, non solo in fase di build) usa il
# suo default, che e' UTC - sovrascrivendo silenziosamente ad ogni riavvio
# qualunque fuso orario impostato a mano negli hook di build (causa reale
# dell'orologio indietro di 2 ore, confermata: non era un problema del
# solo hook di build, che veniva comunque rifatto a UTC al boot).
LIVE_TIMEZONE="Europe/Rome"
